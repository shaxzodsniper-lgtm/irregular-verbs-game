<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Irregular Verbs Challenge</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
color:#fff;
font-family:Arial,sans-serif;
padding:20px;
text-align:center;
min-height:100vh;
}

.container{
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:15px;
}

.box{
background:#222;
padding:12px;
border-radius:14px;
flex:1;
font-size:20px;
}

.score{color:#2a9d8f;}
.lives{color:#e76f51;}

.progress{
background:#222;
padding:10px;
border-radius:14px;
margin-bottom:15px;
}

.timer{
font-size:24px;
margin:15px 0;
color:#2a9d8f;
font-weight:bold;
}

.verb{
font-size:60px;
font-weight:bold;
color:#2a9d8f;
margin-top:15px;
}

.translation{
color:#aaa;
margin:10px 0 20px;
font-size:18px;
}

.question{
font-size:20px;
margin-bottom:12px;
}

input{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:14px;
margin-bottom:10px;
text-align:center;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#2a9d8f;color:white;}
.secondary{background:#444;color:white;}
.danger{background:#e76f51;color:white;}

.gameover{
background:#222;
padding:25px;
border-radius:18px;
margin-top:30px;
}

.final{
font-size:55px;
color:#2a9d8f;
margin:15px 0;
font-weight:bold;
}

.notification{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:40px;
z-index:999;
font-weight:bold;
}

.success{background:#2a9d8f;}
.error{background:#e76f51;}

/* Leaderboard tugmasi */
.leaderboard-btn {
    background: #ffd700;
    color: #111;
    margin-top: 5px;
}
</style>
</head>

<body>
<div class="container">

<div id="gameScreen">

<div class="header">
<div class="box score">🏆 <span id="score">0</span></div>
<div class="box lives">❤️ <span id="lives">3</span></div>
</div>

<div class="progress" id="progress">1 / 10</div>

<div class="timer" id="timer">⏱️ 8s</div>

<div class="verb" id="verb">go</div>
<div class="translation" id="translation">bormoq</div>
<div class="question" id="question">V2 shaklini yozing</div>

<input id="answer" placeholder="Javobingiz...">

<button class="primary" onclick="checkAnswer()">✅ Tekshirish</button>
<button class="secondary" onclick="skipQuestion()">⏭️ Skip</button>
<button class="danger" onclick="restartGame()">🔄 Restart</button>
<button class="leaderboard-btn" onclick="showLeaderboard()">🏆 Reyting</button>

</div>

<div id="gameOverScreen" style="display:none;">
<div class="gameover">
<h2>🎯 O'yin tugadi!</h2>
<div class="final" id="finalScore">0</div>
<div id="finalText"></div>
<br>
<button class="primary" onclick="restartGame()">🔄 Qayta o'ynash</button>
<button class="leaderboard-btn" onclick="showLeaderboard()">🏆 Reytingni ko'rish</button>
</div>
</div>

<!-- Leaderboard ekrani -->
<div id="leaderboardScreen" style="display:none;">
<div class="gameover">
<h2>🏆 TOP 10 O'yinchilar</h2>
<div id="leaderboardList" style="text-align:left; margin:20px 0;">
Yuklanmoqda...
</div>
<button class="primary" onclick="hideLeaderboard()">⬅️ Orqaga</button>
</div>
</div>

</div>

<script>
const tg = window.Telegram?.WebApp || {
ready(){},
expand(){},
initDataUnsafe:{}
};

tg.ready();
tg.expand();

/* SUPABASE */
const SUPABASE_URL = "https://vkliiyqxjuhxaafrnyrb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrbGlpeXF4anVoeGFhZnJueXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzkyODYsImV4cCI6MjA5MTcxNTI4Nn0.Jn6xSg8GryDygzB3Y_y99zd1hGJ7ekXZVeNY312GJb8";

let db = null;

if(window.supabase){
const { createClient } = window.supabase;
db = createClient(SUPABASE_URL,SUPABASE_KEY);
}

/* TELEGRAM BOT */
const BOT_TOKEN = "8687480142:AAGG4HCSSN9QzxRDY3U1hZwp6zPtrbKEWOo";
const CHANNEL_ID = "@englishcodebyshaxzod";

/* VERBS */
const verbs = [
{v1:"go",v2:"went",v3:"gone",t:"bormoq"},
{v1:"eat",v2:"ate",v3:"eaten",t:"yemoq"},
{v1:"see",v2:"saw",v3:"seen",t:"ko'rmoq"},
{v1:"write",v2:"wrote",v3:"written",t:"yozmoq"},
{v1:"come",v2:"came",v3:"come",t:"kelmoq"},
{v1:"take",v2:"took",v3:"taken",t:"olmoq"},
{v1:"speak",v2:"spoke",v3:"spoken",t:"gapirmoq"},
{v1:"know",v2:"knew",v3:"known",t:"bilmoq"},
{v1:"give",v2:"gave",v3:"given",t:"bermoq"},
{v1:"begin",v2:"began",v3:"begun",t:"boshlamoq"}
];

/* GAME VARIABLES */
let questions = [];
let current = 0;
let score = 0;
let lives = 3;
let time = 8;
let timer = null;

/* USER */
let userName = "Player";
let userId = "guest";

if(tg.initDataUnsafe.user){
userId = tg.initDataUnsafe.user.id;
userName = tg.initDataUnsafe.user.first_name || "Player";
}

/* BUILD QUESTIONS */
function buildQuestions(){
questions = [];
verbs.forEach(v=>{
questions.push({
verb:v.v1,
trans:v.t,
ask:"V2 shaklini yozing",
correct:v.v2
});

questions.push({
verb:v.v1,
trans:v.t,
ask:"V3 shaklini yozing",
correct:v.v3
});
});

questions.sort(()=>Math.random()-0.5);
}

/* UI */
function $(id){
return document.getElementById(id);
}

function notify(text,type="success"){
const n=document.createElement("div");
n.className="notification "+type;
n.innerText=text;
document.body.appendChild(n);

setTimeout(()=>{
n.remove();
},1800);
}

/* TIMER */
function startTimer(){
clearInterval(timer);
time = 8;
$("timer").innerText="⏱️ "+time+"s";

timer = setInterval(()=>{
time--;
$("timer").innerText="⏱️ "+time+"s";

if(time<=3){
$("timer").style.color="#e76f51";
}

if(time<=0){
clearInterval(timer);
lives--;
updateLives();
notify("⏰ Vaqt tugadi","error");

if(lives<=0){
endGame();
}else{
current++;
loadQuestion();
}
}
},1000);
}

/* LOAD QUESTION */
function loadQuestion(){

if(current>=questions.length){
endGame(true);
return;
}

const q=questions[current];

$("verb").innerText=q.verb;
$("translation").innerText=q.trans;
$("question").innerText=q.ask;
$("answer").value="";
$("progress").innerText=(current+1)+" / "+questions.length;
$("answer").focus();
$("timer").style.color="#2a9d8f";

startTimer();
}

/* CHECK */
function checkAnswer(){

const q=questions[current];
const ans=$("answer").value.trim().toLowerCase();

if(ans===q.correct.toLowerCase()){

score++;
score += Math.floor(time/2);

$("score").innerText=score;

notify("✅ To'g'ri");

clearInterval(timer);
current++;
loadQuestion();

}else{

lives--;
updateLives();

notify("❌ "+q.correct,"error");

clearInterval(timer);

if(lives<=0){
endGame();
}else{
current++;
loadQuestion();
}
}
}

/* SKIP */
function skipQuestion(){
lives--;
updateLives();
notify("⏭️ Skip","error");
clearInterval(timer);

if(lives<=0){
endGame();
}else{
current++;
loadQuestion();
}
}

/* UPDATE LIVES */
function updateLives(){
$("lives").innerText=lives;
}

/* === LEADERBOARD XABARINI YANGILASH === */
async function updateLeaderboardMessage() {
    if (!db) return;
    
    try {
        // TOP 10 o'yinchilarni olish
        const { data: topPlayers, error } = await db
            .from("leaderboard")
            .select("user_name, score")
            .order("score", { ascending: false })
            .limit(10);
        
        if (error || !topPlayers.length) return;
        
        // Leaderboard matnini tayyorlash
        let message = "🏆 **TOP 10 O'YINCHILAR**\n\n";
        topPlayers.forEach((player, index) => {
            const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `${index+1}.`;
            message += `${medal} ${player.user_name}: ${player.score} ball\n`;
        });
        message += `\n🔄 Yangilandi: ${new Date().toLocaleTimeString('uz-UZ')}`;
        
        // Saqlangan xabar ID'sini olish
        const { data: configData } = await db
            .from("config")
            .select("message_id")
            .eq("key", "leaderboard_msg")
            .single();
        
        if (configData && configData.message_id) {
            // Xabarni tahrirlash
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/editMessageText`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    message_id: configData.message_id,
                    text: message,
                    parse_mode: "Markdown"
                })
            });
        } else {
            // Yangi xabar yuborish
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHANNEL_ID,
                    text: message,
                    parse_mode: "Markdown"
                })
            });
            
            const result = await response.json();
            
            if (result.ok && result.result) {
                const messageId = result.result.message_id;
                
                // Xabar ID'sini saqlash
                await db.from("config").upsert({
                    key: "leaderboard_msg",
                    message_id: messageId
                });
                
                // Xabarni pin qilish
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/pinChatMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_id: messageId,
                        disable_notification: true
                    })
                });
            }
        }
    } catch (e) {
        console.log("Leaderboard yangilashda xato:", e);
    }
}

/* END GAME */
async function endGame(completed=false){

clearInterval(timer);

$("gameScreen").style.display="none";
$("gameOverScreen").style.display="block";

$("finalScore").innerText=score;
$("finalText").innerText=
completed ?
"Barcha savollar tugadi!" :
(current)+" ta savol ishladingiz";

/* SUPABASE SAVE */
if(db){
try{
await db
.from("leaderboard")
.insert([{
user_id:String(userId),
user_name:userName,
score:score,
created_at:new Date().toISOString()
}]);
}catch(e){}
}

/* LEADERBOARD XABARINI YANGILASH */
await updateLeaderboardMessage();

/* O'yinchi natijasini kanalga yuborish */
try{
fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHANNEL_ID,
text:`🎯 ${userName}\n🏆 Score: ${score}\n📚 ${current}/${questions.length}`
})
});
}catch(e){}
}

/* === LEADERBOARD EKRANI === */
async function showLeaderboard() {
    $("gameScreen").style.display = "none";
    $("gameOverScreen").style.display = "none";
    $("leaderboardScreen").style.display = "block";
    
    const listEl = $("leaderboardList");
    listEl.innerHTML = "Yuklanmoqda...";
    
    if (!db) {
        listEl.innerHTML = "Ulanish yo'q";
        return;
    }
    
    try {
        const { data: topPlayers } = await db
            .from("leaderboard")
            .select("user_name, score")
            .order("score", { ascending: false })
            .limit(10);
        
        if (!topPlayers || topPlayers.length === 0) {
            listEl.innerHTML = "Hali o'yinchi yo'q";
            return;
        }
        
        let html = "";
        topPlayers.forEach((player, index) => {
            const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `${index+1}.`;
            html += `<div style="padding:10px; background:#333; margin:5px 0; border-radius:10px;">
                ${medal} ${player.user_name}: <strong>${player.score}</strong> ball
            </div>`;
        });
        
        listEl.innerHTML = html;
    } catch (e) {
        listEl.innerHTML = "Xatolik yuz berdi";
    }
}

function hideLeaderboard() {
    $("leaderboardScreen").style.display = "none";
    if ($("gameScreen").style.display === "none" && $("gameOverScreen").style.display === "none") {
        $("gameScreen").style.display = "block";
    }
}

/* RESTART */
function restartGame(){
score=0;
lives=3;
current=0;

$("score").innerText="0";
$("lives").innerText="3";

$("gameOverScreen").style.display="none";
$("leaderboardScreen").style.display="none";
$("gameScreen").style.display="block";

buildQuestions();
loadQuestion();
}

/* ENTER */
$("answer").addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkAnswer();
}
});

/* START */
restartGame();

</script>
</body>
</html>
