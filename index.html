<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Irregular Verbs Challenge</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
color:#fff;
font-family:Arial,sans-serif;
padding:20px;
text-align:center;
min-height:100vh;
}

.container{
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:15px;
}

.box{
background:#222;
padding:12px;
border-radius:14px;
flex:1;
font-size:20px;
}

.score{color:#2a9d8f;}
.lives{color:#e76f51;}

.progress{
background:#222;
padding:10px;
border-radius:14px;
margin-bottom:15px;
}

.timer{
font-size:24px;
margin:15px 0;
color:#2a9d8f;
font-weight:bold;
}

.verb{
font-size:60px;
font-weight:bold;
color:#2a9d8f;
margin-top:15px;
}

.translation{
color:#aaa;
margin:10px 0 20px;
font-size:18px;
}

.question{
font-size:20px;
margin-bottom:12px;
}

input{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:14px;
margin-bottom:10px;
text-align:center;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:14px;
margin-bottom:10px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#2a9d8f;color:white;}
.secondary{background:#444;color:white;}
.danger{background:#e76f51;color:white;}

.gameover{
background:#222;
padding:25px;
border-radius:18px;
margin-top:30px;
}

.final{
font-size:55px;
color:#2a9d8f;
margin:15px 0;
font-weight:bold;
}

.notification{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:40px;
z-index:999;
font-weight:bold;
}

.success{background:#2a9d8f;}
.error{background:#e76f51;}
</style>
</head>

<body>
<div class="container">

<div id="gameScreen">

<div class="header">
<div class="box score">🏆 <span id="score">0</span></div>
<div class="box lives">❤️ <span id="lives">3</span></div>
</div>

<div class="progress" id="progress">1 / 10</div>

<div class="timer" id="timer">⏱️ 8s</div>

<div class="verb" id="verb">go</div>
<div class="translation" id="translation">bormoq</div>
<div class="question" id="question">V2 shaklini yozing</div>

<input id="answer" placeholder="Javobingiz...">

<button class="primary" onclick="checkAnswer()">✅ Tekshirish</button>
<button class="secondary" onclick="skipQuestion()">⏭️ Skip</button>
<button class="danger" onclick="restartGame()">🔄 Restart</button>

</div>

<div id="gameOverScreen" style="display:none;">
<div class="gameover">
<h2>🎯 O'yin tugadi!</h2>
<div class="final" id="finalScore">0</div>
<div id="finalText"></div>
<br>
<button class="primary" onclick="restartGame()">🔄 Qayta o'ynash</button>
</div>
</div>

</div>

<script>
const tg = window.Telegram?.WebApp || {
ready(){},
expand(){},
initDataUnsafe:{}
};

tg.ready();
tg.expand();

/* SUPABASE */
const SUPABASE_URL = "https://vkliiyqxjuhxaafrnyrb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrbGlpeXF4anVoeGFhZnJueXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzkyODYsImV4cCI6MjA5MTcxNTI4Nn0.Jn6xSg8GryDygzB3Y_y99zd1hGJ7ekXZVeNY312GJb8";

let db = null;

if(window.supabase){
const { createClient } = window.supabase;
db = createClient(SUPABASE_URL,SUPABASE_KEY);
}

/* TELEGRAM BOT */
const BOT_TOKEN = "8687480142:AAGG4HCSSN9QzxRDY3U1hZwp6zPtrbKEWOo";
const GROUP_ID = "@englishcodebyshaxzod";

/* VERBS */
const verbs = [
{v1:"go",v2:"went",v3:"gone",t:"bormoq"},
{v1:"eat",v2:"ate",v3:"eaten",t:"yemoq"},
{v1:"see",v2:"saw",v3:"seen",t:"ko'rmoq"},
{v1:"write",v2:"wrote",v3:"written",t:"yozmoq"},
{v1:"come",v2:"came",v3:"come",t:"kelmoq"},
{v1:"take",v2:"took",v3:"taken",t:"olmoq"},
{v1:"speak",v2:"spoke",v3:"spoken",t:"gapirmoq"},
{v1:"know",v2:"knew",v3:"known",t:"bilmoq"},
{v1:"give",v2:"gave",v3:"given",t:"bermoq"},
{v1:"begin",v2:"began",v3:"begun",t:"boshlamoq"}
];

/* GAME VARIABLES */
let questions = [];
let current = 0;
let score = 0;
let lives = 3;
let time = 8;
let timer = null;

/* USER */
let userName = "Player";
let userId = "guest";

if(tg.initDataUnsafe.user){
userId = tg.initDataUnsafe.user.id;
userName = tg.initDataUnsafe.user.first_name || "Player";
}

/* BUILD QUESTIONS */
function buildQuestions(){
questions = [];
verbs.forEach(v=>{
questions.push({
verb:v.v1,
trans:v.t,
ask:"V2 shaklini yozing",
correct:v.v2
});

questions.push({
verb:v.v1,
trans:v.t,
ask:"V3 shaklini yozing",
correct:v.v3
});
});

questions.sort(()=>Math.random()-0.5);
}

/* UI */
function $(id){
return document.getElementById(id);
}

function notify(text,type="success"){
const n=document.createElement("div");
n.className="notification "+type;
n.innerText=text;
document.body.appendChild(n);

setTimeout(()=>{
n.remove();
},1800);
}

/* TIMER */
function startTimer(){
clearInterval(timer);
time = 8;
$("timer").innerText="⏱️ "+time+"s";

timer = setInterval(()=>{
time--;
$("timer").innerText="⏱️ "+time+"s";

if(time<=3){
$("timer").style.color="#e76f51";
}

if(time<=0){
clearInterval(timer);
lives--;
updateLives();
notify("⏰ Vaqt tugadi","error");

if(lives<=0){
endGame();
}else{
current++;
loadQuestion();
}
}
},1000);
}

/* LOAD QUESTION */
function loadQuestion(){

if(current>=questions.length){
endGame(true);
return;
}

const q=questions[current];

$("verb").innerText=q.verb;
$("translation").innerText=q.trans;
$("question").innerText=q.ask;
$("answer").value="";
$("progress").innerText=(current+1)+" / "+questions.length;
$("answer").focus();
$("timer").style.color="#2a9d8f";

startTimer();
}

/* CHECK */
function checkAnswer(){

const q=questions[current];
const ans=$("answer").value.trim().toLowerCase();

if(ans===q.correct.toLowerCase()){

score++;
score += Math.floor(time/2);

$("score").innerText=score;

notify("✅ To'g'ri");

clearInterval(timer);
current++;
loadQuestion();

}else{

lives--;
updateLives();

notify("❌ "+q.correct,"error");

clearInterval(timer);

if(lives<=0){
endGame();
}else{
current++;
loadQuestion();
}
}
}

/* SKIP */
function skipQuestion(){
lives--;
updateLives();
notify("⏭️ Skip","error");
clearInterval(timer);

if(lives<=0){
endGame();
}else{
current++;
loadQuestion();
}
}

/* UPDATE LIVES */
function updateLives(){
$("lives").innerText=lives;
}

/* END GAME */
async function endGame(completed=false){

clearInterval(timer);

$("gameScreen").style.display="none";
$("gameOverScreen").style.display="block";

$("finalScore").innerText=score;
$("finalText").innerText=
completed ?
"Barcha savollar tugadi!" :
(current)+" ta savol ishladingiz";

/* SUPABASE SAVE */
if(db){
try{
await db
.from("leaderboard")
.insert([{
user_id:String(userId),
user_name:userName,
score:score,
created_at:new Date().toISOString()
}]);
}catch(e){}
}

/* SEND TO TELEGRAM GROUP */
try{
fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:GROUP_ID,
text:`🎯 ${userName}\n🏆 Score: ${score}\n📚 ${current}/${questions.length}`
})
});
}catch(e){}
}

/* RESTART */
function restartGame(){
score=0;
lives=3;
current=0;

$("score").innerText="0";
$("lives").innerText="3";

$("gameOverScreen").style.display="none";
$("gameScreen").style.display="block";

buildQuestions();
loadQuestion();
}

/* ENTER */
$("answer").addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkAnswer();
}
});

/* START */
restartGame();

</script>
</body>
</html>
