/* ========== GAME VARIABLES ========== */
let allQuestions = [], questions = [], current = 0, score = 0, lives = 3, time = 8, timer = null, gameActive = true;
let userName = "", userId = "";

/* ========== UI ========== */
function $(id){ return document.getElementById(id); }
function notify(text,type="success"){ const n=document.createElement("div"); n.className="notification "+type; n.innerText=text; document.body.appendChild(n); setTimeout(()=>n.remove(),1800); }

/* ========== USER ========== */
async function loadUserName(){
    const savedName = localStorage.getItem('verbGame_playerName');
    const savedId = localStorage.getItem('verbGame_userId');

    if(savedName && savedId){
        userName = savedName;
        userId = savedId;
        return;
    }

    if(tg.initDataUnsafe && tg.initDataUnsafe.user){
        const u = tg.initDataUnsafe.user;
        userId = "tg_" + u.id;
        const full = ((u.first_name || "") + " " + (u.last_name || "")).trim();
        userName = full || u.username || "";
    }

    if(!userName || userName === "Player" || userName === ""){
        let name = prompt("🏆 Reytingda ko'rinishi uchun ismingizni kiriting:", "");
        if(!name || !name.trim()){
            const names = ["O'quvchi", "Student", "Learner", "Pupil"];
            name = names[Math.floor(Math.random() * names.length)] + "_" + Math.floor(Math.random() * 100);
        }
        userName = name.trim();
    }

    if(!userId){
        userId = "guest_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
    }

    localStorage.setItem('verbGame_playerName', userName);
    localStorage.setItem('verbGame_userId', userId);
}

/* ========== SAVOLLAR ========== */
function buildQuestions(){
    allQuestions = [];
    verbsList.forEach(v=>{
        allQuestions.push({verb:v.v1, trans:v.t, ask:"V2 shaklini yozing", correct:v.v2});
        allQuestions.push({verb:v.v1, trans:v.t, ask:"V3 shaklini yozing", correct:v.v3});
    });
}
function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

/* ========== TAYMER ========== */
function startTimer(){
    clearInterval(timer);
    time=8;
    $("timer").innerText="⏱️ "+time+"s";
    $("timer").style.color="#2a9d8f";
    timer=setInterval(()=>{
        time--;
        $("timer").innerText="⏱️ "+time+"s";
        if(time<=3) $("timer").style.color="#e76f51";
        if(time<=0){
            clearInterval(timer);
            if(!gameActive) return;
            lives--;
            updateLives();
            notify("⏰ Vaqt tugadi!","error");
            if(lives<=0) endGame();
            else{ current++; loadQuestion(); }
        }
    },1000);
}
function updateLives(){ $("lives").innerText=lives; }

/* ========== SAVOL YUKLASH ========== */
function loadQuestion(){
    if(!gameActive) return;
    if(current >= questions.length){ endGame(true); return; }
    const q = questions[current];
    $("verb").innerText = q.verb;
    $("translation").innerText = q.trans;
    $("question").innerText = q.ask;
    $("progress").innerText = (current+1) + " / " + questions.length;
    $("answer").value = "";
    $("answer").focus();
    startTimer();
}

/* ========== JAVOBNI TEKSHIRISH ========== */
function checkAnswer(){
    if(!gameActive) return;
    const q = questions[current];
    const ans = $("answer").value.trim().toLowerCase();
    const valid = q.correct.toLowerCase().split('/');
    clearInterval(timer);
    if(valid.includes(ans)){
        score++;
        score += Math.floor(time/2);
        $("score").innerText = score;
        notify("✅ To'g'ri");
    } else {
        lives--;
        updateLives();
        notify("❌ " + q.correct, "error");
    }
    if(lives <= 0){
        endGame();
        return;
    }
    current++;
    loadQuestion();
}

function skipQuestion(){
    if(!gameActive) return;
    clearInterval(timer);
    lives--;
    updateLives();
    notify("⏭️ Skip", "error");
    if(lives <= 0){
        endGame();
        return;
    }
    current++;
    loadQuestion();
}

/* ========== LEADERBOARD: TOP 10 ========== */
async function getTop10(){
    try{
        const { data, error } = await db
            .from("leaderboard")
            .select("user_name,score")
            .order("score", { ascending:false })
            .limit(10);

        if(error){
            console.log(error);
            return [];
        }

        return data || [];

    }catch(err){
        console.log("getTop10 error:", err);
        return [];
    }
}

/* ========== NATIJANI SAQLASH (BEST SCORE) ========== */
async function saveScore(){
  if(!db) return score;

  try{
    const { data: old, error } = await db
      .from("leaderboard")
      .select("score")
      .eq("user_id", userId)
      .maybeSingle();

    const oldScore = old ? Number(old.score) : 0;

    if(score > oldScore){
      const { error: upsertError } = await db
        .from("leaderboard")
        .upsert({
          user_id: userId,
          user_name: userName,
          score: score,
          updated_at: new Date().toISOString()
        });

      if(upsertError) console.log(upsertError);
      return score;
    }

    return oldScore;

  }catch(err){
    console.log(err);
    return score;
  }
}

/* ========== TELEGRAM XABARINI YANGILASH ========== */
async function updateTelegramLeaderboard(){
    try{
        const top = await getTop10();
        if(top.length === 0) return;

        let text = "🏆 TOP 10 O'YINCHILAR\n\n";

        top.forEach((p,i)=>{
            const medal =
                i===0 ? "🥇" :
                i===1 ? "🥈" :
                i===2 ? "🥉" :
                (i+1) + ".";

            text += `${medal} ${p.user_name} - ${p.score}\n`;
        });

        text += "\n🎮 Pastdagi tugma orqali o'ynang!";

        const keyboard = {
            inline_keyboard:[
                [{ text:"🎮 O'yinni boshlash", url:GAME_URL }]
            ]
        };

        /* config dan value ni o'qiymiz */
        const { data: cfg, error } = await db
            .from("config")
            .select("value")
            .eq("key","leaderboard_msg")
            .maybeSingle();

        if(error) console.log(error);

        /* message_id mavjud bo'lsa edit qilamiz */
        if(cfg && cfg.value){

            const res = await fetch(
                `https://api.telegram.org/bot${BOT_TOKEN}/editMessageText`,
                {
                    method:"POST",
                    headers:{ "Content-Type":"application/json" },
                    body:JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_id: Number(cfg.value),
                        text: text,
                        reply_markup: keyboard
                    })
                }
            );

            const json = await res.json();

            /* agar "message is not modified" bo'lsa normal holat */
            if(json.ok) return;

            if(json.description &&
               json.description.includes("message is not modified")){
                return;
            }

            /* faqat message topilmasa yangi yaratamiz */
            if(json.description &&
               (
                 json.description.includes("message to edit not found") ||
                 json.description.includes("MESSAGE_ID_INVALID")
               )){
                await createNewMessage(text, keyboard);
            }

            return;
        }

        /* config bo'sh bo'lsa 1 marta yaratadi */
        await createNewMessage(text, keyboard);

    }catch(err){
        console.log("updateTelegramLeaderboard error:", err);
    }
}

async function createNewMessage(text, keyboard){
    try{
        const res = await fetch(
            `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
            {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body:JSON.stringify({
                    chat_id: CHANNEL_ID,
                    text: text,
                    reply_markup: keyboard
                })
            }
        );

        const json = await res.json();

        if(json.ok && json.result){

            const msgId = String(json.result.message_id);

            /* value ustuniga saqlaymiz */
            await db.from("config").upsert({
                key: "leaderboard_msg",
                value: msgId
            });

            /* pin */
            await fetch(
                `https://api.telegram.org/bot${BOT_TOKEN}/pinChatMessage`,
                {
                    method:"POST",
                    headers:{ "Content-Type":"application/json" },
                    body:JSON.stringify({
                        chat_id: CHANNEL_ID,
                        message_id: Number(msgId),
                        disable_notification: true
                    })
                }
            );
        }

    }catch(err){
        console.log("createNewMessage error:", err);
    }
}

/* ========== O'YIN TUGADI ========== */
async function endGame(completed = false){
    clearInterval(timer);
    gameActive = false;

    $("gameScreen").style.display = "none";
    $("gameOverScreen").style.display = "block";
    $("finalScore").innerText = score;

    const best = await saveScore();
    $("finalText").innerText = completed
        ? `🎉 Tugatdingiz!\n🏆 Eng yaxshi: ${best}`
        : `📊 Bu safar: ${score}\n🏆 Eng yaxshi: ${best}`;

    await updateTelegramLeaderboard();
}

/* ========== REYTING EKRANI ========== */
async function showLeaderboard(){
    $("gameScreen").style.display = "none";
    $("gameOverScreen").style.display = "none";
    $("leaderboardScreen").style.display = "block";

    const top = await getTop10();
    let html = "";
    top.forEach((p, i) => {
        const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i+1) + ".";
        html += `<div style="padding:12px;background:#333;margin:6px 0;border-radius:12px"><strong>${medal}</strong> ${p.user_name}: ${p.score} ball</div>`;
    });
    $("leaderboardList").innerHTML = html || "Hali o'yinchi yo'q";
}

function hideLeaderboard(){
    $("leaderboardScreen").style.display = "none";
    if(gameActive) $("gameScreen").style.display = "block";
    else $("gameOverScreen").style.display = "block";
}

/* ========== RESTART ========== */
async function restartGame(){
    clearInterval(timer);
    score = 0; lives = 3; current = 0; gameActive = true;
    $("score").innerText = "0";
    $("lives").innerText = "3";
    $("gameOverScreen").style.display = "none";
    $("leaderboardScreen").style.display = "none";
    $("gameScreen").style.display = "block";

    buildQuestions();
    questions = shuffleArray([...allQuestions]);
    loadQuestion();
}

$("answer").addEventListener("keypress", e => { if(e.key === "Enter") checkAnswer(); });

/* ========== START ========== */
(async function(){
    await loadUserName();
    buildQuestions();
    questions = shuffleArray([...allQuestions]);
    loadQuestion();
})();
